services:
  - type: web
    name: billdeskpro-server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: YOUR_AIVEN_HOST
      - key: DB_PORT
        value: 21863
      - key: DB_USER
        value: YOUR_AIVEN_USER
      - key: DB_PASSWORD
        value: YOUR_AIVEN_PASSWORD
      - key: DB_NAME
        value: defaultdb
      - key: JWT_SECRET
        value: billdeskpro_secret_key_2026
      - key: JWT_EXPIRE
        value: 8h