services:
  - type: web
    name: billdeskpro-server
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: ${DB_HOST}
      - key: DB_PORT
        value: ${DB_PORT}
      - key: DB_USER
        value: ${DB_USER}
      - key: DB_PASSWORD
        value: ${DB_PASSWORD}
      - key: DB_NAME
        value: ${DB_NAME}
      - key: DB_FORCE_SSL
        value: "true"
      - key: JWT_SECRET
        value: billdeskpro_secret_key_2026
      - key: JWT_EXPIRE
        value: 8h

  - type: web
    name: billdeskpro-frontend
    runtime: node
    buildCommand: cd client && npm install && npm run build
    startCommand: npx serve -s client/build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        value: https://billdeskpro-server.onrender.com/api/v1
      - key: NODE_ENV
        value: production