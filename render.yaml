services:
  - type: web
    name: billdeskpro-server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: ${DB_HOST}
      - key: DB_PORT
        value: ${DB_PORT}
      - key: DB_USER
        value: ${DB_USER}
      - key: DB_PASSWORD
        value: ${DB_PASSWORD}
      - key: DB_NAME
        value: ${DB_NAME}
      - key: DB_FORCE_SSL
        value: "true"
      - key: JWT_SECRET
        value: billdeskpro_secret_key_2026
      - key: JWT_EXPIRE
        value: 8h