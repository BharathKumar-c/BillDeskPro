services:
  - type: web
    name: billdeskpro-server
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: your-mysql-host.render.io
      - key: DB_USER
        value: your-db-user
      - key: DB_PASSWORD
        value: your-db-password
      - key: DB_NAME
        value: billing_system_db
      - key: JWT_SECRET
        value: your-secret-key-change-me
      - key: JWT_EXPIRE
        value: 8h